<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Segurança — São Sebastião DF</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: sans-serif; background: #FAF7F2; }
  #mapa { height: 100vh; width: 100%; }

  .controles {
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    background: rgba(250,247,242,0.97);
    border: 1px solid rgba(28,25,23,0.08);
    border-radius: 14px; padding: 16px 18px;
    box-shadow: 0 2px 16px rgba(28,25,23,0.08);
    font-size: 13px; min-width: 180px;
  }
  .controles strong {
    display: block; margin-bottom: 10px;
    font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: #6B6560;
  }
  .controles label {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; margin-bottom: 8px;
    font-size: 0.83rem; color: #1C1917;
  }
  .controles label:last-child { margin-bottom: 0; }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .dot-confirmado { background: #e74c3c; }
  .dot-pendente   { background: #999; }
  .dot-mulher     { background: #8B5E9E; }
  .dot-sos        { background: #C2185B; }

  .legenda {
    position: absolute; bottom: 24px; left: 12px; z-index: 1000;
    background: rgba(250,247,242,0.97);
    border: 1px solid rgba(28,25,23,0.08);
    border-radius: 14px; padding: 14px 18px;
    box-shadow: 0 2px 16px rgba(28,25,23,0.08);
    font-size: 12px;
  }
  .legenda strong {
    display: block; margin-bottom: 8px;
    font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: #6B6560;
  }
  .leg-item {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 5px; color: #1C1917; font-size: 0.8rem;
  }
  .leg-item:last-child { margin-bottom: 0; }

  .contador {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(250,247,242,0.97);
    border: 1px solid rgba(28,25,23,0.08);
    border-radius: 14px; padding: 14px 18px;
    box-shadow: 0 2px 16px rgba(28,25,23,0.08);
    text-align: center;
  }
  .contador-num {
    font-size: 2rem; font-weight: 700;
    color: #8B5E9E; line-height: 1;
  }
  .contador-label {
    font-size: 0.7rem; color: #6B6560;
    margin-top: 4px; line-height: 1.4;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .ao-vivo {
    position: absolute; top: 120px; left: 12px; z-index: 1000;
    background: rgba(250,247,242,0.97);
    border: 1px solid rgba(139,94,158,0.2);
    border-radius: 100px; padding: 6px 14px;
    display: flex; align-items: center; gap: 6px;
    font-size: 0.72rem; font-weight: 600;
    color: #8B5E9E; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .ao-vivo-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #8B5E9E;
    animation: pulsar 2s ease-in-out infinite;
  }
  @keyframes pulsar {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.3; transform:scale(0.6); }
  }

  @media(max-width:600px) {
    .controles { top:auto; bottom:80px; right:8px; padding:12px 14px; }
    .legenda { display:none; }
    .contador { top:8px; left:8px; padding:10px 14px; }
    .ao-vivo { top:auto; bottom:8px; left:8px; }
  }
</style>
</head>
<body>

<div id="mapa"></div>

<!-- Contador -->
<div class="contador">
  <div class="contador-num" id="total">—</div>
  <div class="contador-label">alertas<br>registrados</div>
</div>

<!-- Badge ao vivo -->
<div class="ao-vivo">
  <span class="ao-vivo-dot"></span>
  ao vivo
</div>

<!-- Filtros -->
<div class="controles">
  <strong>Filtrar</strong>
  <label>
    <input type="checkbox" id="chk-geral" checked>
    <span class="dot dot-confirmado"></span> Alertas gerais
  </label>
  <label>
    <input type="checkbox" id="chk-mulher" checked>
    <span class="dot dot-mulher"></span> Espaço Seguro
  </label>
</div>

<!-- Legenda -->
<div class="legenda">
  <strong>Legenda</strong>
  <div class="leg-item"><span class="dot dot-confirmado"></span> Alerta confirmado</div>
  <div class="leg-item"><span class="dot dot-pendente"></span> Alerta pendente</div>
  <div class="leg-item"><span class="dot dot-mulher"></span> Espaço Seguro</div>
  <div class="leg-item"><span class="dot dot-sos"></span> SOS</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const FB = "https://seguranca-sao-sebastiao-dee0a-default-rtdb.firebaseio.com";

  // Centro fixo em São Sebastião DF
  const mapa = L.map("mapa").setView([-15.9149, -47.8021], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(mapa);

  // ── Ícones ────────────────────────────────────────────────
  function icone(cor, emoji) {
    return L.divIcon({
      html: `<div style="background:${cor};width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.25)"><span style="transform:rotate(45deg);font-size:16px">${emoji}</span></div>`,
      className: "",
      iconSize: [36, 36],
      iconAnchor: [18, 36]
    });
  }
  const icConfirmado = icone("#e74c3c", "🚨");
  const icPendente   = icone("#999999", "⏳");
  const icMulher     = icone("#8B5E9E", "🚺");
  const icSOS        = icone("#C2185B", "🆘");

  // ── Camadas separadas ─────────────────────────────────────
  const camadaGeral  = L.layerGroup().addTo(mapa);
  const camadaMulher = L.layerGroup().addTo(mapa);

  // ── Carrega alertas gerais ────────────────────────────────
  async function carregarGeral() {
    try {
      const dados = await (await fetch(FB + "/alertas.json")).json();
      camadaGeral.clearLayers();
      if (!dados) return;

      Object.values(dados).forEach(a => {
        if (!a.lat || !a.lng) return;

        // Se tipo for mulher, usa ícone roxo mesmo estando no nó geral
        let ic;
        if (a.tipo === "mulher") {
          ic = (a.descricao || "").toLowerCase().includes("ajuda") ? icSOS : icMulher;
        } else {
          ic = a.status === "confirmado" ? icConfirmado : icPendente;
        }

        const popup = `
          <b>${a.tipo === "mulher" ? "🚺" : "🚨"} ${a.descricao || "Alerta"}</b><br>
          🕐 ${a.hora || ""} · ${a.data || ""}<br>
          ${a.tipo === "mulher"
            ? "<i style='color:#8B5E9E'>Relato anônimo — Espaço Seguro</i>"
            : `✅ ${a.confirmacoes || 0} confirmação(ões) · <span style='color:${a.status === "confirmado" ? "#e74c3c" : "#999"}'>${a.status || "pendente"}</span>`
          }
        `;

        L.marker([a.lat, a.lng], { icon: ic })
          .bindPopup(popup)
          .addTo(camadaGeral);
      });

      atualizarContador();
    } catch(e) {
      console.error("Erro ao carregar alertas gerais:", e);
    }
  }

  // ── Carrega relatos femininos ─────────────────────────────
  async function carregarMulheres() {
    try {
      const dados = await (await fetch(FB + "/alertas_mulheres.json")).json();
      camadaMulher.clearLayers();
      if (!dados) return;

      Object.values(dados).forEach(a => {
        if (!a.lat || !a.lng) return;

        const isSOS = (a.categoria || a.descricao || "").toLowerCase().includes("ajuda");
        const ic    = isSOS ? icSOS : icMulher;

        const popup = `
          <b>🚺 ${a.categoria || a.descricao || "Relato"}</b><br>
          🕐 ${a.hora || ""} · ${a.data || ""}<br>
          <i style="color:#8B5E9E">Relato anônimo — Espaço Seguro</i>
        `;

        L.marker([a.lat, a.lng], { icon: ic })
          .bindPopup(popup)
          .addTo(camadaMulher);
      });

      atualizarContador();
    } catch(e) {
      console.error("Erro ao carregar relatos femininos:", e);
    }
  }

  // ── Atualiza contador ─────────────────────────────────────
  function atualizarContador() {
    const total = camadaGeral.getLayers().length + camadaMulher.getLayers().length;
    document.getElementById("total").textContent = total;
  }

  // ── Filtros ───────────────────────────────────────────────
  document.getElementById("chk-geral").addEventListener("change", e => {
    e.target.checked ? mapa.addLayer(camadaGeral) : mapa.removeLayer(camadaGeral);
  });
  document.getElementById("chk-mulher").addEventListener("change", e => {
    e.target.checked ? mapa.addLayer(camadaMulher) : mapa.removeLayer(camadaMulher);
  });

  // ── Carrega e atualiza a cada 30 segundos ─────────────────
  carregarGeral();
  carregarMulheres();
  setInterval(carregarGeral,    30000);
  setInterval(carregarMulheres, 30000);
</script>
</body>
</html>
